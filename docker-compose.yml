name: telesecundaria

services:
  api:
    build:
      context: .
      dockerfile: Telesecundaria/Dockerfile
    container_name: telesecundaria_api
    ports:
      - "5000:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnectionString: "Host=db;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
      Smtp__From: "${SMTP_FROM}"
      Smtp__User: "${SMTP_USER}"
      Smtp__Password: "${SMTP_PASSWORD}"
      Jwt__Key: "${JWT_KEY}"
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    networks:
      - telesecundaria_net

  db:
    image: postgres:16
    container_name: telesecundaria_db
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - telesecundaria_net

networks:
  telesecundaria_net:
    driver: bridge

volumes:
  postgres_data:
  uploads_data: